services:

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexjal_api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./legal_docs:/app/legal_docs:ro
      - ./logs:/app/logs
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - lexjal_net
    mem_limit: 2500m

  postgres:
    image: postgres:16-alpine
    container_name: lexjal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexjal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lexjal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lexjal_net
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexjal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lexjal_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lexjal_net
    mem_limit: 150m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    container_name: lexjal_chromadb
    restart: unless-stopped
    environment:
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - lexjal_net
    mem_limit: 300m

volumes:
  postgres_data:
  redis_data:
  chroma_data:

networks:
  lexjal_net:
    driver: bridge

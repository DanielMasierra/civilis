# ============================================================
# LexJal — Configuración Nginx
# Proxy reverso con SSL, rate limiting y headers de seguridad
# ============================================================

events {
    worker_connections 1024;
}

http {
    # ── Rate limiting de Nginx (capa extra sobre el de Redis) ────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # ── Tipos MIME ───────────────────────────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Optimizaciones ────────────────────────────────────────────────────────
    sendfile        on;
    gzip            on;
    gzip_types      application/json text/plain text/css application/javascript;
    keepalive_timeout 65;
    client_max_body_size 50M;   # Para subida de PDFs vía admin

    # ── Redirección HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name lexjal.com www.lexjal.com;

        # Certbot (renovación automática de SSL)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS principal ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name lexjal.com www.lexjal.com;

        # Certificados SSL (generados con Certbot / Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ── Headers de seguridad ─────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # ── API principal ────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://api:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade          $http_upgrade;
            proxy_set_header   Connection       "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    300s;   # Para respuestas largas del agente
            proxy_connect_timeout 10s;
        }

        # ── Endpoint de consultas (rate limit más estricto) ──────────────────
        location /api/consulta/ {
            limit_req zone=api_limit burst=3 nodelay;

            proxy_pass         http://api:8080/consulta/;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

            # SSE (streaming de respuestas)
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
        }

        # ── Health check (sin rate limit) ────────────────────────────────────
        location /health {
            proxy_pass http://api:8080/health;
        }

        # ── Bloquear rutas de administración de acceso directo ───────────────
        location /api/admin/ {
            # Solo accesible desde IPs de administración o VPN
            # allow 200.X.X.X;  # Tu IP estática
            # deny all;

            proxy_pass         http://api:8080/admin/;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
        }
    }
}
